<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Jogador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <h1>Perfil de Jogador</h1>
            <h2 id="nickname">Nickname do Usuário</h2>
        </div>

        <div class="games-section">
            <h3>Jogos principais:</h3>
            <ul id="games-list">
                <li>
                    <span>Grand Theft Auto V</span>
                    <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/271590/header.jpg?t=1726606628" alt="Jogo 1">
                </li>
                <li>
                    <span>Counter-Strike 2</span>
                    <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/730/header.jpg?t=1719426374" alt="Jogo 2">
                </li>
                <li>
                    <span>Rocket League</span>
                    <img src="https://shared.steamstatic.com/store_item_assets/steam/apps/252950/header.jpg?t=1726856715" alt="Jogo 3">
                </li>
                <li>
                    <span>Overwatch® 2</span>
                    <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2357570/header.jpg?t=1727296520" alt="Jogo 4">
                </li>
            </ul>
        </div>

        <div class="links-section">
            <h3>Conecte-se:</h3>
            <div class="link-blocks">
                <a href="#" class="link-block discord">
                    <img src="https://img.icons8.com/?size=512&id=30998&format=png" alt="Discord">
                    Discord
                </a>
                <a style="color: black;" href="#" class="link-block epic">
                    <img src="https://cdn.icon-icons.com/icons2/2389/PNG/512/epic_games_logo_icon_145306.png" alt="Epic Games">
                    Epic Games
                </a>
                <a href="#" class="link-block steam">
                    <img src="https://static-00.iconduck.com/assets.00/steam-icon-512x512-loj8x1rd.png" alt="Steam">
                    Steam
                </a>
                <a href="#" class="link-block play">
                    <img src="https://www.pngplay.com/wp-content/uploads/13/Playstation-Logo-Free-PNG.png" alt="Playstation">
                    Playstation
                </a>
                <a href="#" class="link-block xbox">
                    <img src="https://cdn-icons-png.flaticon.com/512/906/906325.png" alt="Xbox">
                    Xbox
                </a>
            </div>
        </div>
    </div>
</body>
</html>
