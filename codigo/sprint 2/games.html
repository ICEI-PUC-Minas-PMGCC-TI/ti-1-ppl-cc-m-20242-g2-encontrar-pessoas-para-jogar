<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="bg-dark text-light py-3">
        <div class="container">
            <h1 class="logo">Jogos</h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a class="nav-link text-light" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="explorer.html">Pesquisar Jogos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container my-5">
        <h2>Jogos</h2>
        <div class="row mb-4">
            <div class="col-md-8">
                <input type="text" class="form-control" placeholder="Pesquisar jogos..." id="searchInput">
            </div>
            <div class="col-md-4">
                <select class="form-select" id="filterSelect">
                    <option value="all">Tipo</option>
                    <option value="FPS">FPS</option>
                    <option value="MMORPG">MMORPG</option>
                    <option value="Simulação">Simulação</option>
                </select>
            </div>
        </div>

        <div class="row" id="gameList">
            
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script> 
</body>

</html>
