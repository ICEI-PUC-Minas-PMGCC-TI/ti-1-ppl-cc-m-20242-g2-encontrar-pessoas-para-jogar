<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 300px;
            width: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <header class="bg-dark text-light py-3">
        <div class="container">
            <h1 class="logo"></h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a class="nav-link text-light" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="explorer.html">Pesquisar Jogos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container my-5">
        <h2>Jogos</h2>
        <div class="row mb-4">
            <div class="col-md-8">
                <input type="text" class="form-control" placeholder="Pesquisar jogos..." id="searchInput">
            </div>
            <div class="col-md-4">
                <select class="form-select" id="filterSelect">
                    <option value="all">Tipo</option>
                    <option value="FPS">FPS</option>
                    <option value="MMORPG">MMORPG</option>
                    <option value="Simulação">Simulação</option>
                </select>
            </div>
        </div>

        <div class="row" id="gameList">
            <div class="col-md-4 game-card" data-type="FPS">
                <div class="card">
                    <img src="valorant.jpg" class="card-img-top" alt="Valorant">
                    <div class="card-body">
                        <h5 class="card-title">Valorant</h5>
                        <a href="#" class="btn btn-primary">Ver Detalhes</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 game-card" data-type="FPS">
                <div class="card">
                    <img src="csgo.jpg" class="card-img-top" alt="CS:GO">
                    <div class="card-body">
                        <h5 class="card-title">CS:GO</h5>
                        <a href="#" class="btn btn-primary">Ver Detalhes</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 game-card" data-type="Simulação">
                <div class="card">
                    <img src="fifa25.jpg" class="card-img-top" alt="FIFA 25">
                    <div class="card-body">
                        <h5 class="card-title">FIFA 25</h5>
                        <a href="#" class="btn btn-primary">Ver Detalhes</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 game-card" data-type="Simulação">
                <div class="card">
                    <img src="minecraft.jpg" class="card-img-top" alt="Minecraft">
                    <div class="card-body">
                        <h5 class="card-title">Minecraft</h5>
                        <a href="#" class="btn btn-primary">Ver Detalhes</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 game-card" data-type="MMORPG">
                <div class="card">
                    <img src="leagueoflegends.jpg" class="card-img-top" alt="League of Legends">
                    <div class="card-body">
                        <h5 class="card-title">League of Legends</h5>
                        <a href="#" class="btn btn-primary">Ver Detalhes</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 game-card" data-type="Simulação">
                <div class="card">
                    <img src="roblox.jpg" class="card-img-top" alt="Roblox">
                    <div class="card-body">
                        <h5 class="card-title">Roblox</h5>
                        <a href="#" class="btn btn-primary">Ver Detalhes</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4 game-card" data-type="Simulação">
                <div class="card">
                    <img src="deadbydaylight.jpg" class="card-img-top" alt="Dead by Daylight">
                    <div class="card-body">
                        <h5 class="card-title">Dead by Daylight</h5>
                        <a href="#" class="btn btn-primary">Ver Detalhes</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const filterSelect = document.getElementById('filterSelect');
            const searchInput = document.getElementById('searchInput');
            const gameList = document.getElementById('gameList');

            function filterGames() {
                const filterValue = filterSelect.value.toLowerCase();
                const searchQuery = searchInput.value.toLowerCase();
                const games = gameList.getElementsByClassName('game-card');

                Array.from(games).forEach(game => {
                    const gameType = game.getAttribute('data-type').toLowerCase();
                    const gameTitle = game.querySelector('.card-title').textContent.toLowerCase();

                    if ((filterValue === 'all' || gameType === filterValue) && gameTitle.includes(searchQuery)) {
                        game.style.display = 'block';
                    } else {
                        game.style.display = 'none';
                    }
                });
            }

            filterSelect.addEventListener('change', filterGames);
            searchInput.addEventListener('input', filterGames);
        });
    </script>
</body>
</html>
