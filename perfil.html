<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- Link para o CSS externo -->
    <style>
        .stars {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
        }

        .stars input[type="radio"] {
            display: none;
        }

        .stars label {
            color: gray;
            font-size: 2em;
            padding: 0 10px;
            cursor: pointer;
        }

        .stars input[type="radio"]:checked ~ label {
            color: gold;
        }

        .stars label:hover,
        .stars label:hover ~ label {
            color: gold;
        }
    </style>
</head>
<body>
    <header class="bg-dark text-light py-3">
        <div class="container">
            <h1 class="logo">Perfil de Usuário</h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a class="nav-link text-light" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="explorer.html">Explorar Jogos</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="container my-5">
        <div class="row">
            <div class="col-md-4">
                <img src="perfil.jpg" class="img-fluid" alt="Perfil do Usuário">
                <h3>@usuario</h3>
                <p>Descrição breve do usuário.</p>
            </div>
            <div class="col-md-8">
                <h3>Avaliação</h3>
                <form action="#">
                    <div class="stars">
                        <input type="radio" id="star5" name="rating" value="5">
                        <label for="star5">&#9733;</label>
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4">&#9733;</label>
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3">&#9733;</label>
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2">&#9733;</label>
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1">&#9733;</label>
                    </div>
                </form>
                <button class="btn btn-primary mt-3">Enviar Avaliação</button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
